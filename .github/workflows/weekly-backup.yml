name: Weekly Database Backup

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          test -n "$DATABASE_URL"
          mkdir -p backups
          pg_dump "$DATABASE_URL" --format=custom --file="backups/encurtador-$(date +%F).dump"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: encurtador-backup-${{ github.run_number }}
          path: backups/*.dump
          retention-days: 56
